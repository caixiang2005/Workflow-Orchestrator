<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证码邮件</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f5f2eb;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
        <tr>
            <td style="padding: 40px 0;">
                <table role="presentation" width="560" cellspacing="0" cellpadding="0" border="0" align="center" style="background-color: #ffffff; border-radius: 10px; box-shadow: 0 1px 8px rgba(0,0,0,0.06);">
                    <!-- Logo和标题区域 -->
                    <tr>
                        <td style="padding: 36px 40px 22px;">
                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                                <tr>
                                    <td style="width: 100px; vertical-align: middle;">
                                        <img src="{logo_url}" alt="incx Logo" style="width: 72px; height: auto; display: block;">
                                    </td>
                                    <td style="vertical-align: middle; text-align: center;">
                                        <h1 style="margin: 0; font-size: 22px; font-weight: 600; color: #3a3a3a;">
                                            邮箱验证
                                        </h1>
                                    </td>
                                    <td style="width: 100px; vertical-align: middle;">
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- 分隔线 -->
                    <tr>
                        <td style="padding: 0 40px;">
                            <hr style="border: none; border-top: 1px solid #e8e4dc; margin: 0;">
                        </td>
                    </tr>
                    
                    <!-- 正文内容 -->
                    <tr>
                        <td style="padding: 32px 40px 24px; text-align: center;">
                            <p style="margin: 0; font-size: 15px; line-height: 1.8; color: #6b6560;">
                                您好，感谢您使用 incx 服务！<br>
                                您的验证码为：
                            </p>
                        </td>
                    </tr>
                    
                    <!-- 验证码 -->
                    <tr>
                        <td style="padding: 0 40px 28px; text-align: center;">
                            <div style="display: inline-block; background-color: #f0ece5; padding: 16px 48px; border-radius: 6px;">
                                <span style="font-size: 30px; font-weight: 600; color: #5a5550; letter-spacing: 5px; font-family: 'Courier New', monospace;">
                                    {code}
                                </span>
                            </div>
                        </td>
                    </tr>
                    
                    <!-- 温馨提示 -->
                    <tr>
                        <td style="padding: 0 40px 36px;">
                            <div style="background-color: #faf8f4; padding: 18px 22px; border-radius: 6px; border-left: 3px solid #c9b99a;">
                                <p style="margin: 0 0 8px; font-size: 14px; color: #6b6560;">
                                    <strong style="color: #5a5550;">温馨提示：</strong>
                                </p>
                                <ul style="margin: 0; padding-left: 20px; font-size: 13px; color: #7a7570; line-height: 1.9;">
                                    <li>验证码有效期为 <strong>10分钟</strong>，请尽快完成验证</li>
                                    <li>验证码唯一有效，请勿泄露给他人</li>
                                    <li>如非本人操作，请忽略此邮件</li>
                                </ul>
                            </div>
                        </td>
                    </tr>
                    
                    <!-- 底部 -->
                    <tr>
                        <td style="padding: 22px 40px; background-color: #faf8f4; border-top: 1px solid #e8e4dc; border-radius: 0 0 10px 10px;">
                            <p style="margin: 0 0 6px; font-size: 12px; color: #a8a29e; text-align: center;">
                                © 2026 incx. All rights reserved.
                            </p>
                            <p style="margin: 0; font-size: 12px; color: #a8a29e; text-align: center;">
                                如果您有任何问题，请联系我们的客服团队
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
