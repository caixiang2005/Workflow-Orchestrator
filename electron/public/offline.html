<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Launcher</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .header p {
      color: #888;
      font-size: 14px;
    }

    .wifi-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .wifi-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .wifi-header h2 {
      font-size: 18px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .wifi-header h2 i {
      color: #00d4ff;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .wifi-list {
      list-style: none;
      max-height: 400px;
      overflow-y: auto;
    }

    .wifi-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .wifi-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(0, 212, 255, 0.3);
    }

    .wifi-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .wifi-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(0, 212, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wifi-icon i {
      color: #00d4ff;
      font-size: 18px;
    }

    .wifi-name {
      font-size: 15px;
      font-weight: 500;
    }

    .wifi-signal {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .signal-bars {
      display: flex;
      gap: 2px;
    }

    .signal-bar {
      width: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }

    .signal-bar:nth-child(1) { height: 6px; }
    .signal-bar:nth-child(2) { height: 10px; }
    .signal-bar:nth-child(3) { height: 14px; }
    .signal-bar:nth-child(4) { height: 18px; }

    .signal-bar.active {
      background: #00d4ff;
    }

    .signal-text {
      font-size: 12px;
      color: #888;
      min-width: 40px;
      text-align: right;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      margin-top: 16px;
    }

    .status-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4757;
    }

    .status-dot.connected {
      background: #2ed573;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 28px;
      width: 90%;
      max-width: 400px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .modal p {
      color: #888;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    .input-group input:focus {
      border-color: #00d4ff;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: #888;
    }

    .loading.active {
      display: flex;
    }

    .loading i {
      margin-right: 10px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      color: #444;
    }

    .empty-state p {
      font-size: 14px;
    }

    .log-area {
      margin-top: 20px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      max-height: 150px;
      overflow-y: auto;
      display: none;
    }

    .log-area.active {
      display: block;
    }

    .log-line {
      color: #888;
      margin-bottom: 4px;
    }

    .log-line.error {
      color: #ff4757;
    }

    .log-line.success {
      color: #2ed573;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-rocket"></i> Workflow Launcher</h1>
      <p>桌面环境离线入口</p>
    </div>

    <div class="wifi-card">
      <div class="wifi-header">
        <h2><i class="fas fa-wifi"></i> 无线网络</h2>
        <button class="btn btn-primary" id="scanBtn" onclick="scanWifi()">
          <i class="fas fa-sync-alt"></i> 扫描网络
        </button>
      </div>

      <div class="loading" id="loading">
        <i class="fas fa-spinner"></i> 正在扫描...
      </div>

      <div class="empty-state" id="emptyState">
        <i class="fas fa-wifi"></i>
        <p>点击"扫描网络"查找可用的Wi-Fi</p>
      </div>

      <ul class="wifi-list" id="wifiList"></ul>

      <div class="status-bar">
        <div class="status-info">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">未连接</span>
        </div>
        <button class="btn btn-secondary" onclick="toggleLog()">
          <i class="fas fa-terminal"></i> 日志
        </button>
      </div>

      <div class="log-area" id="logArea"></div>
    </div>
  </div>

  <div class="modal-overlay" id="connectModal">
    <div class="modal">
      <h3 id="modalSsid">连接 Wi-Fi</h3>
      <p>输入密码进行连接</p>
      <div class="input-group">
        <label>Wi-Fi 密码</label>
        <input type="password" id="passwordInput" placeholder="请输入密码">
      </div>
      <div class="modal-buttons">
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="confirmConnect()">
          <i class="fas fa-link"></i> 连接
        </button>
      </div>
    </div>
  </div>

  <script>
    let currentSsid = '';
    let logVisible = false;

    function log(message, type = 'info') {
      const logArea = document.getElementById('logArea');
      logArea.classList.add('active');
      const line = document.createElement('div');
      line.className = `log-line ${type}`;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logArea.appendChild(line);
      logArea.scrollTop = logArea.scrollHeight;
    }

    function toggleLog() {
      logVisible = !logVisible;
      document.getElementById('logArea').classList.toggle('active', logVisible);
    }

    function getSignalLevel(signal) {
      if (signal >= -50) return 4;
      if (signal >= -60) return 3;
      if (signal >= -70) return 2;
      return 1;
    }

    function renderWifiList(networks) {
      const list = document.getElementById('wifiList');
      const empty = document.getElementById('emptyState');
      const loading = document.getElementById('loading');

      loading.classList.remove('active');

      if (!networks || Object.keys(networks).length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      list.innerHTML = '';

      Object.entries(networks).forEach((entry) => {
        const ssid = entry[0];
        const signal = entry[1];
        const level = getSignalLevel(signal);
        const item = document.createElement('li');
        item.className = 'wifi-item';
        item.innerHTML = `
          <div class="wifi-info">
            <div class="wifi-icon">
              <i class="fas fa-wifi"></i>
            </div>
            <span class="wifi-name">${ssid}</span>
          </div>
          <div class="wifi-signal">
            <div class="signal-bars">
              ${[1,2,3,4].map(i => `<div class="signal-bar ${i <= level ? 'active' : ''}"></div>`).join('')}
            </div>
            <span class="signal-text">${signal} dBm</span>
          </div>
        `;
        item.onclick = (function(s) {
          return function() {
            openConnectModal(s);
          };
        })(ssid);
        list.appendChild(item);
      });
    }

    function openConnectModal(ssid) {
      currentSsid = ssid;
      document.getElementById('modalSsid').textContent = `连接 ${ssid}`;
      document.getElementById('passwordInput').value = '';
      document.getElementById('connectModal').classList.add('active');
      document.getElementById('passwordInput').focus();
    }

    function closeModal() {
      document.getElementById('connectModal').classList.remove('active');
      currentSsid = '';
    }

    async function scanWifi() {
      const btn = document.getElementById('scanBtn');
      const loading = document.getElementById('loading');
      const empty = document.getElementById('emptyState');

      btn.disabled = true;
      loading.classList.add('active');
      empty.style.display = 'none';
      document.getElementById('wifiList').innerHTML = '';

      log('开始扫描Wi-Fi网络...');

      try {
        const result = await window.wifiAPI.scan();
        log(`扫描完成，发现 ${Object.keys(result.networks || {}).length} 个网络`, 'success');
        renderWifiList(result.networks);
      } catch (err) {
        log('扫描失败: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    async function confirmConnect() {
      const password = document.getElementById('passwordInput').value;
      const ssidToConnect = currentSsid;

      if (!ssidToConnect) {
        log('错误: 未选择Wi-Fi网络', 'error');
        return;
      }

      if (!password) {
        alert('请输入密码');
        return;
      }

      closeModal();
      log(`正在连接 ${ssidToConnect}...`);

      try {
        const result = await window.wifiAPI.connect(ssidToConnect, password);
        log(`原始返回: ${JSON.stringify(result)}`);
        if (result.success) {
          log(`成功连接到 ${ssidToConnect}`, 'success');
          updateStatus(true);
        } else {
          log(`连接失败: ${result.error || JSON.stringify(result)}`, 'error');
          updateStatus(false);
        }
      } catch (err) {
        log(`连接异常: ${err.message}`, 'error');
      }
    }

    function updateStatus(connected) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      if (connected) {
        dot.classList.add('connected');
        text.textContent = '已连接';
      } else {
        dot.classList.remove('connected');
        text.textContent = '未连接';
      }
    }

    document.getElementById('passwordInput').addEventListener('keyup', (e) => {
      if (e.key === 'Enter') {
        confirmConnect();
      }
    });

    document.getElementById('connectModal').addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-overlay')) {
        closeModal();
      }
    });
  </script>
</body>
</html>
